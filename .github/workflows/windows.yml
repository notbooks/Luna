name: Build for Windows

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    
    steps:
    - name: Checkout Git Repo
      uses: actions/checkout@v3

    # BEST PRACTICE: Use the official MSYS2 action to guarantee 
    # make and gcc are installed and in the PATH correctly.
    - name: Install MinGW via MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: mingw64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-make

    # CRITICAL FIX: Use 'shell: msys2 {0}' so the Makefile 
    # variables (CC=gcc) are parsed correctly.
    - name: Build
      shell: msys2 {0}
      run: |
        make -j4 CC=gcc

    # SAFER UPLOAD: Uses a wildcard to find the exe regardless 
    # of which folder the Makefile put it in.
    - name: Upload zip
      uses: actions/upload-artifact@v3
      with:
          name: luna-win64
          path: "**/*.exe" 
          if-no-files-found: error
